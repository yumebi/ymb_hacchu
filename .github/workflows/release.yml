name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Compute next version
        id: version
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $current = [version]$pkg.version

          $tags = git tag --list 'v*' | ForEach-Object {
            try { [version]($_ -replace '^v', '') } catch { $null }
          } | Where-Object { $_ } | Sort-Object -Descending

          $latestTag = if ($tags.Count -gt 0) { $tags[0] } else { [version]'0.0.0' }

          if ($current -gt $latestTag) {
            $next = $current
          } else {
            $nextBuild = $latestTag.Build + 1
            if ($nextBuild -gt 9) {
              $next = [version]"$($latestTag.Major).$($latestTag.Minor + 1).0"
            } else {
              $next = [version]"$($latestTag.Major).$($latestTag.Minor).$nextBuild"
            }
          }

          $nextStr = "$($next.Major).$($next.Minor).$($next.Build)"
          Write-Output "version=$nextStr" >> $env:GITHUB_OUTPUT

      - name: Update version files
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"

          (Get-Content package.json -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$v`"" |
            Set-Content package.json -NoNewline

          (Get-Content version.json -Raw) -replace '"version":\s*"[^"]+"', "`"version`": `"$v`"" |
            Set-Content version.json -NoNewline

      - name: Commit version bump and tag
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json version.json
          git commit -m "v${v}: バージョン更新 (CI自動)"
          git tag "v$v"
          git push origin HEAD:master
          git push origin "v$v"

      - name: Build installer / portable exe
        run: npm run dist

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $v = "${{ steps.version.outputs.version }}"
          gh release create "v$v" dist/YmbHacchuKun-Setup-*.exe dist/YmbHacchuKun-Portable-*.exe --title "v$v" --generate-notes
